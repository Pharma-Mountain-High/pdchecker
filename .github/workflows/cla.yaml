name: CLA 🔏

on:
  issue_comment:
    types:
      - created
  # For PRs that originate from forks
  pull_request_target:
    types:
      - opened
      - closed
      - synchronize

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write
  checks: write
  issues: write

jobs:
  CLA:
    name: CLA 📝
    uses: insightsengineering/.github/.github/workflows/cla.yaml@main
    secrets: inherit
