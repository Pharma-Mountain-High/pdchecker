# Markdownlint configuration
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# MD013 - Line length
MD013:
  line_length: 800
  code_blocks: false
  tables: false

# MD033 - Allow inline HTML
MD033: false

# MD041 - First line should be a heading (not required for all files)
MD041: false

